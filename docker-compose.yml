version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: wtf-db
    restart: always
    environment:
      POSTGRES_DB: wtf_livepulse
      POSTGRES_USER: wtf
      POSTGRES_PASSWORD: wtf_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "psql -U wtf -d wtf_livepulse -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wtf-backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env.docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: 'http://localhost:3001'
    container_name: wtf-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
